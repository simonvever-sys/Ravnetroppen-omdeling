<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Min rute</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar route-topbar">
    <h2 id="routeTitle">Rute</h2>
    <button id="logoutBtn" class="secondary-btn" type="button">Log ud</button>
  </header>

  <main class="route-main">
    <section class="route-progress" aria-live="polite">
      <p id="progressText">Afkrydset: 0 / 0</p>
      <div class="progress-track" aria-hidden="true">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </section>
    <ul id="addressList" aria-live="polite"></ul>
  </main>

  <div id="popup" class="popup hidden" aria-hidden="true">
    <div class="popup-content" role="dialog" aria-modal="true">
      <div id="menuView">
        <button id="mapsBtn" type="button">📍 Vis adresse</button>
        <button id="reportBtn" type="button">🚨 Rapportér adresse</button>
        <button id="closePopup" class="secondary-btn" type="button">Luk</button>
      </div>

      <div id="reportView" class="hidden">
        <h3>Rapportér problem</h3>

        <label for="problemType">Problemtype</label>
        <select id="problemType">
          <option value="Ingen postkasse">Ingen postkasse</option>
          <option value="Ingen nummer på postkasse">Ingen nummer på postkasse</option>
          <option value="Postkasse fuld">Postkasse fuld</option>
          <option value="Forkert adresse">Forkert adresse</option>
          <option value="Adgang blokeret">Adgang blokeret</option>
          <option value="Andet">Andet</option>
        </select>

        <label for="comment">Kommentar (valgfri)</label>
        <input type="text" id="comment" placeholder="Skriv kort...">

        <label for="reportCamera" id="takePhotoBtn" class="secondary-btn report-camera-trigger">Tag billede med kamera</label>
        <p class="report-or">eller</p>
        <label for="reportImage" class="report-upload-label">Vedhæft billede fra galleri</label>
        <input type="file" id="reportImage" accept="image/*">
        <p class="report-upload-help">Valgfri. Maks 10 MB.</p>
        <p id="reportImageStatus" class="report-upload-status"></p>
        <input type="file" id="reportCamera" accept="image/*" capture="environment" class="report-camera-input">

        <button id="sendReport" type="button">Send rapport</button>
        <button id="backBtn" class="secondary-btn" type="button">Tilbage</button>
      </div>
    </div>
  </div>

  <button class="theme-toggle" type="button" aria-label="Skift tema"></button>
  <script src="theme.js?v=20260225"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js?v=20260225"></script>
  <script src="route.js?v=20260225"></script>
</body>
</html>
